<!doctype html>
<head>
  <title>Cosmic Critters</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="tiny-brutalism.css" />
  <style>
    :root {
      --dirt-brown: rgb(156, 117, 84);
      --space-blue: rgb(84, 156, 153);
    }
    body {
      cursor: none;
    }
    button {
      background-color: var(--space-blue);
    }
    .menuDiv {
      gap: 20px;
      padding: 30px;
      cursor: auto;
      display: flex;
      align-items: center;
      flex-direction: column;
      background-color: var(--dirt-brown);
    }
    #floatingDiv {
      position: absolute;
      cursor: auto;
      z-index: 1;
      width: 100%;
      height: 75%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #scoreTimerDisplay {
      position: absolute;
      top: 10px;
      background-color: var(--space-blue);
    }
    #pauseButton {
      display: none;
      position: absolute;
      align-items: center;
      left: 10px;
      top: 10px;
    }
  </style>
</head>
<body>
  <div id="floatingDiv">
    <div id="scoreTimerDisplay" class="box"><b>00:00</b></div>
    <button id="pauseButton" onclick="pause()">Pause</button>
    <div id="pauseMenu" class="menuDiv box" style="display: none">
      <b style="font-size: 50px">Pause</b>
      <p>scan an animal from each species!</p>
      <div>
        <button onclick="restart()">Restart</button>
        <button onclick="unpause()">Continue</button>
      </div>
    </div>
    <div id="endMenu" class="menuDiv box" style="display: none">
      <b id="finalTimeDisplay" style="font-size: 50px">00:00</b>
      <p>all of the animals have been scanned into the database!</p>
      <div>
        <button onclick="start()">Play Again</button>
      </div>
    </div>
    <div id="mainMenu" class="menuDiv box">
      <b style="font-size: 50px">Cosmic Critters</b>
      <p>Your mission is to scan each species of animal</p>
      <div>
        <button onclick="start()">Start</button>
      </div>
    </div>
  </div>
  <script src="littlejs.js"></script>
  <script src="game.js"></script>
  <script>
    const pauseMenuVisible = (visible) =>
      (pauseMenu.style.display = visible ? "flex" : "none");
    const mainMenuVisible = (visible) =>
      (mainMenu.style.display = visible ? "flex" : "none");
    const endMenuVisible = (visible) =>
      (endMenu.style.display = visible ? "flex" : "none");
    startBgm = null
    var bgm = new SoundWave("LacunaLiner.mp3");
    var pulsePausedAt = null;
    var scoreTimerPausedAt = null;
    var startBgm = null
    start = () => {
          sfx.buttonPress.play();
          floatingDiv.style.cursor = "none";
          pauseButton.style.display = "flex";
          mainMenuVisible(false);
          pauseMenuVisible(false);
          endMenuVisible(false);
	  if (bgm.isLoading()) setTimeout(() => bgm.play(), 2500)
	  else bgm.play()
	  startGame()
    };
    const pause = () => {
      sfx.buttonPress.play();
      floatingDiv.style.cursor = "auto";
      pauseButton.style.display = "none";
      pulsePausedAt = animalPulse.get() * -1;
      scoreTimerPausedAt = scoreTimer.get() * -1;
      pauseMenuVisible(true);
      animalPulse = null;
    };
    const unpause = () => {
      sfx.buttonPress.play();
      floatingDiv.style.cursor = "none";
      pauseButton.style.display = "flex";
      pauseMenuVisible(false);
      animalPulse = new Timer(pulsePausedAt);
      scoreTimer = new Timer(scoreTimerPausedAt);
    };
    const restart = () => {
      sfx.buttonPress.play();
      pauseMenuVisible(false);
      mainMenuVisible(true);
      animals = [];
      bgm.stop();
    };
    const gameOver = () => {
      floatingDiv.style.cursor = "auto";
      finalTimeDisplay.innerHTML = scoreTimerDisplay.innerHTML;
      mainMenuVisible(false);
      pauseMenuVisible(false);
      endMenuVisible(true);
      bgm.stop();
      endGame();
    };
  </script>
</body>
